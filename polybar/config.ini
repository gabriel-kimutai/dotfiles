[colors]
purple = #b16286
green = #b8bb26
aqua = #689d6a
red = #cc241d
bg = #1d2021
fg = #ebdbb2
alpha = #00000000
white = #ebdbb2
yellow = #d79921
dim = #504945
blue = #458588

[bar/top]
monitor = ${env:MONITOR:DP-0}

override-redirect = false

bottom = false

fixed-center = true

width = 100%
height = 25

offset-x = 
offset-y =  

background = ${colors.bg}

foreground = ${colors.fg}

line-size = 2
line-color = #fff

padding-right = 1 
padding-left = 0

module-margin = 0

font-0 = "JetBrainsMono Nerd Font:pixelsize=11;3"
font-1 = "Material Icons:pixelsize=12;5"
font-2 = "Noto Sans Mono CJK JP:pixelsize=10;5"




modules-left = bspwm sps title
modules-center = mpd
modules-right = pulseaudio sps battery sps date sps time sps powermenu
separator =

spacing = 0

dim-value = 1.0

wm-name = bspwm

tray-position = right

tray-detached = false

tray-background = ${colors.bg}

tray-offset-x = 0
tray-offset-y = 0

tray-padding = 0

tray-scale = 1

wm-restack = bspwm

dpi-x = 96
dpi-y = 96

enable-ipc = false

border-color = ${colors.alpha}

[module/bspwm]
type = internal/bspwm

pin-workspaces = false

inline-mode = false

enable-click = true

enable-scroll = true

reverse-scroll = true

fuzzy-match = true

ws-icon-0 = "I;%{T0} 1 %{T-}"
ws-icon-1 = "II;%{T0} 2 %{T-}"
ws-icon-2 = "III;%{T0} 3 %{T-}"
ws-icon-3 = "IV;%{T0} 4 %{T-}"
ws-icon-4 = "V;%{T0} 5 %{T-}"

format = <label-state> <label-mode>

label-monitor = %name%

label-focused = %icon%
label-focused-foreground = ${colors.fg}
label-focused-background = ${colors.bg}
label-focused-underline = ${colors.yellow}
label-focused-border = ${colors.yellow}

label-occupied = %icon%
label-occupied-padding = 0
label-occupied-foreground = ${colors.fg}

label-urgent = %icon%
label-urgent-foreground = ${colors.red}

label-empty = 

label-separator = ""
label-separator-padding = 0 
label-separator-foreground = ${colors.bg}

[module/date]
type = internal/date
format-underline = ${colors.purple}
interval = 1.0
date = %{T0}%a %d.%m.%Y%{T-}

label = [%date%]
format-prefix = "Ó£ü "
label-font = 0
format-label-foreground = ${colors.white}
format-prefix-foreground = ${colors.purple}

[module/time]
type = internal/date
format-underline = ${colors.blue}
interval = 1.0
time = %{T0}%H:%M:%S%{T-}

label = [%time%]
format-prefix = "ÓĘģ "
label-font = 0
label-foreground = ${colors.white}
format-prefix-foreground = ${colors.blue}
[module/sps]
type = custom/text

content = " | "
content-foreground = ${colors.yellow}

content-padding = 0

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = false

interval = 5

format-volume = <label-volume>

format-muted = <label-muted>

label-volume = %{T0}[%percentage%%]%{T-}
label-volume-foreground = ${colors.white}

format-volume-prefix = "ÓĀć "
format-volume-prefix-foreground = ${colors.green}
format-volume-underline = ${colors.green}

label-muted = %{T0}0%%{T-}
label-muted-foreground = ${colors.fg}

format-muted-prefix = "MUTE "
format-muted-prefix-foreground = ${colors.dim}

click-right = pavucontrol &

[module/battery]
type = internal/battery

full-at = 95

battery = BAT1
adapter = ACAD

poll-interval = 3

format-charging = <label-charging> 
format-discharging = <label-discharging>
format-discharging-underline = ${colors.aqua}
format-charging-underline = ${colors.aqua}
format-full-underline = ${colors.green}
format-full = <label-full>

label-charging = [%percentage_raw%%]
label-discharging = [%percentage_raw%%]
label-full = [100%]

label-discharging-foreground = ${colors.white}
label-full-foreground = ${colors.white}

format-charging-prefix = "ÓÜ£ "
format-discharging-prefix = "ÓÜ• "
format-full-prefix = "ÓÜ• "

format-charging-prefix-foreground = ${colors.white}
format-discharging-prefix-foreground = ${colors.aqua}
format-full-prefix-foreground = ${colors.green}

pseudo-transparency = true
format-underline = ${colors.aqua}
[module/mpd]
type = internal/mpd
host = 127.0.0.1
port = 6600
interval = 2


[module/powermenu]
type = custom/menu

expand-right = true

format-spacing = 1

label-active-font = 1
label-open = "ÓĘ¨"
label-open-foreground = ${colors.red}
label-close = "ÓĘ¨"
label-close-foreground = ${colors.red}
label-separator = | 
label-separator-foreground = ${colors.fg}

menu-0-0 = "Shutdown"
menu-0-0-exec = sudo shutdown now
menu-0-1 = "Reboot"
menu-0-1-exec = sudo reboot
menu-0-2 = "Log out"
menu-0-2-exec = bspc quit

[module/title]
type = internal/xwindow

format = <label>
label = [%title%]
label-maxlen = 10


; vim:ft=dosini
